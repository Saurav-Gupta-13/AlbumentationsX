name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

jobs:
  # CodeQL is managed by GitHub default setup for this repository. Adding an
  # advanced CodeQL workflow here makes GitHub reject uploaded SARIF.
  dependency_audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true
        python-version: "3.11"
        activate-environment: true
    - name: Export locked runtime dependencies
      run: >
        uv export --frozen --no-dev --no-emit-project
        --format requirements-txt
        --output-file runtime-requirements.txt
    - name: Run pip-audit
      run: uv tool run --from pip-audit pip-audit --requirement runtime-requirements.txt --no-deps --disable-pip

  workflow_audit:
    name: GitHub Actions hardening audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true
        python-version: "3.11"
        activate-environment: true
    - name: Run zizmor
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        uv tool run --from zizmor zizmor
        --format=github
        --min-severity=medium
        --min-confidence=medium
        .github
