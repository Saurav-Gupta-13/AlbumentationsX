name: CI
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'benchmark/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'benchmark/**'

permissions:
  contents: read

jobs:
  test_and_lint:
    name: Test and lint
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: true
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Install uv and set Python version ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
        activate-environment: true

    - name: Install all dependencies
      run: |
        uv sync --locked --group dev --inexact --no-install-package torch --no-install-package torchvision

    - name: Install PyTorch
      run: |
        if [ "${{ matrix.operating-system }}" = "macos-latest" ]; then
          uv pip install torch==2.10.0 torchvision==0.25.0
        else
          uv pip install torch==2.10.0+cpu torchvision==0.25.0+cpu --extra-index-url https://download.pytorch.org/whl/cpu
        fi
      shell: bash

    - name: Verify uv.lock is up-to-date
      if: matrix.operating-system == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: uv lock --check

    - name: Run PyTest with coverage
      run: uv run pytest -n auto --cov=albumentations --cov-branch --cov-report=xml

    - name: Upload coverage reports to Codecov
      if: matrix.operating-system == 'ubuntu-latest' && matrix.python-version == '3.10'
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: albumentations-team/AlbumentationsX
        files: ./coverage.xml
        fail_ci_if_error: true

  check_code_formatting_types:
    name: Check repository hooks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10"]
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Install uv and set Python version ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
        activate-environment: true

    - name: Install all requirements
      run: uv sync --locked --group dev --inexact

    - name: Run checks
      run: uv run pre-commit run --all-files
    - name: check-defaults-in-apply
      run: uv run python -m tools.check_defaults
